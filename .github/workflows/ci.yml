name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race -timeout 120s ./...

      - name: Build (default, dependency-free)
        run: go build ./...

      - name: Build (production tags)
        run: go build -tags "pgx redis" ./cmd/brain

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
