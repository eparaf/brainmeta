# BrainMeta — full LOCAL stack (no external creds / HTTPS needed).
#
#   cp brain.env.example brain.env   # put your GEMINI_API_KEY here (or leave empty = mock)
#   docker compose up --build
#   open http://localhost:8080        # embedded console
#
# Brings up: brain (built with pgx+redis tags) + Postgres + Redis. Schema is
# auto-applied on first connect. Learned-state snapshot persists on a volume.
# Live Meta/WhatsApp stay off until you add their creds to brain.env + a public
# HTTPS webhook (e.g. `ngrok http 8080`) — everything else runs locally.

services:
  brain:
    build: .
    image: disci/brain:latest
    ports:
      - "8080:8080"
    env_file:
      - brain.env                       # GEMINI_API_KEY etc. (gitignored)
    environment:
      - DATABASE_URL=postgres://brain:brain@db:5432/brain?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - BRAIN_SNAPSHOT=/data/brain-snapshot.json
      - BRAIN_ADDR=:8080
    volumes:
      - brain-data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=brain
      - POSTGRES_PASSWORD=brain
      - POSTGRES_DB=brain
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  brain-data:
  pg-data:
